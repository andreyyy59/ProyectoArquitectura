events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream user_service {
        server ms-01-user:8000;
    }

    upstream content_service {
        server ms-03-content:8000;
    }

    upstream sync_service {
        server ms-04-sync:8000;
    }

    upstream edge_node_service {
        server ms-02-edge-node:8000;
    }

    upstream adaptive_service {
        server ms-05-adaptive:8000;
    }

    upstream ai_service {
        server ms-06-ai:8000;
    }

    upstream analytics_service {
        server ms-07-analytics:8000;
    }

    upstream connectivity_service {
        server ms-08-connectivity:8001;
    }

    upstream reports_service {
        server ms-09-reports:8000;
    }

    upstream notifications_service {
        server ms-10-notifications:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # MS-01: User Management
        location /api/auth/ {
            proxy_pass http://user_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/users/ {
            proxy_pass http://user_service/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-03: Content Management
        location /api/content/ {
            proxy_pass http://content_service/api/content/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-04: Sync Engine
        location /api/sync/ {
            proxy_pass http://sync_service/api/sync/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # MS-02: Edge Node Manager
        location /api/edge-nodes/ {
            proxy_pass http://edge_node_service/api/edge-nodes/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-05: Adaptive Engine
        location /api/adaptive/ {
            proxy_pass http://adaptive_service/api/adaptive/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-06: AI Recommendations
        location /predict {
            proxy_pass http://ai_service/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /recommend {
            proxy_pass http://ai_service/recommend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-07: Learning Analytics
        location /api/analytics/ {
            proxy_pass http://analytics_service/api/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-08: Connectivity Monitor
        location /api/connectivity/ {
            proxy_pass http://connectivity_service/api/connectivity/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-09: Territorial Reports
        location /api/reports/ {
            proxy_pass http://reports_service/api/reports/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MS-10: Notifications
        location /api/notifications/ {
            proxy_pass http://notifications_service/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for Connectivity Monitor
        location /ws/ {
            proxy_pass http://connectivity_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
